name: Publish to JSR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for JSR provenance security

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno lint

      - name: Publish to JSR
        run: deno publish
