name: Publish to JSR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for JSR provenance security

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x # JSR publishing is built into Deno

      - name: Run linter
        run: deno lint

      - name: Publish to JSR
        # This command uses the id-token to prove the build happened on GitHub
        run: npx jsr publish
